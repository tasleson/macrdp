[env]
# Swift concurrency runtime library required by screencapturekit crate.
# Paths are searched in order: Xcode toolchain, then CommandLineTools.
# This is needed for `cargo test` and `cargo bench` to find libswift_Concurrency.dylib.
DYLD_LIBRARY_PATH = { value = "/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.5/macosx:/Library/Developer/CommandLineTools/usr/lib/swift-5.5/macosx", force = true }
