# macrdp server configuration
# Copy this file to config.toml and modify as needed.
#
# All daemon files live under a single base directory:
#   macOS:     ~/Library/Application Support/macrdp/
#   Linux/BSD: $XDG_CONFIG_HOME/macrdp/ (or ~/.config/macrdp/)
#
# Default layout:
#   <base>/config.toml      this file
#   <base>/tls/cert.pem     TLS certificate (auto-generated if missing)
#   <base>/tls/key.pem      TLS private key  (auto-generated, chmod 600)
#   <base>/logs/macrdp.log  daemon log

# ─── Network ───────────────────────────────────────────────────────────────────

# TCP port to listen on
# Default: 3389 (standard RDP port, may require sudo)
# Options: any valid port number (1024-65535 recommended)
port = 13389

# IP address to listen on
# Default: :: (all interfaces, dual-stack IPv4 + IPv6).
# Use 0.0.0.0 for IPv4-only, or 127.0.0.1 to accept local connections only.
bind_address = "::"

# v1 supports one active RDP session at a time.
# Concurrent client sessions are unsupported.

# ─── Authentication ────────────────────────────────────────────────────────────

# RDP login credentials (NLA/Hybrid/CredSSP)
# Both fields are required for unattended daemon use.
username = "admin"
password = "123456"

# Development-only fallback for temporary credentials.
# Default: false. When true and username/password are missing, macrdp generates
# a one-time password using the OS CSPRNG. The password is never logged.
# allow_generated_credentials = false

# ─── Display ───────────────────────────────────────────────────────────────────

# Resolution width in pixels
# Default: 0 (auto-detect from macOS display + follow client request)
# Set to a specific value (e.g. 1920) to force a fixed resolution
width = 0

# Resolution height in pixels
# Default: 0 (auto-detect from macOS display + follow client request)
# Set to a specific value (e.g. 1080) to force a fixed resolution
height = 0

# Target frame rate
# Default: 60
# Options: 30, 60, 120
frame_rate = 60

# Target bitrate in Mbps (default: auto-calculated from resolution/fps/quality)
# Override this to force a specific bitrate. Adaptive quality will still adjust
# within this ceiling based on network conditions.
# bitrate_mbps = 50

# HiDPI scale factor
# Default: 1 (no scaling)
# Multiplies capture resolution for sharper image on Retina displays.
# e.g. scale=2 on a 1920x1080 logical display → captures at 3840x2160 (4K)
# Mouse coordinates are automatically mapped back to logical points.
# hidpi_scale = 2

# Include the macOS cursor in captured video frames.
# Default: true. This shows real macOS cursor shapes such as resize handles and
# text I-beams. When disabled, macrdp sends a fixed synthetic RDP arrow cursor.
# show_cursor = true

# ─── Encoding ──────────────────────────────────────────────────────────────────

# Video quality preset
# Default: high_quality
# Options:
#   "low_latency"  — lower bitrate, fastest encoding (~16 Mbps @ 1080p30)
#   "balanced"     — moderate quality and bitrate (~33 Mbps @ 1080p30)
#   "high_quality" — best visual quality, higher bitrate (~50 Mbps @ 1080p30)
quality = "high_quality"

# H.264 encoder selection
# Default: software
# Options:
#   "software"  — OpenH264 (CPU), full P-frame support, ~40ms encode latency
#   "hardware"  — VideoToolbox (GPU), ~6ms encode latency, requires macOS
#   "auto"      — same as software
encoder = "hardware"

# Chroma subsampling mode
# Default: avc420
# Options:
#   "avc420" — standard YUV 4:2:0 (compatible with all RDP clients)
#   "avc444" — full YUV 4:4:4 via dual-stream AVC444 (requires V10+ client, best quality)
# chroma_mode = "avc420"

# ─── TLS ───────────────────────────────────────────────────────────────────────

# Path to TLS certificate file (PEM format)
# Default: <base>/tls/cert.pem (auto-generated self-signed if missing)
# cert_path = "/path/to/cert.pem"

# Path to TLS private key file (PEM format)
# Default: <base>/tls/key.pem (auto-generated alongside certificate, chmod 600)
# key_path = "/path/to/key.pem"

# ─── Logging ───────────────────────────────────────────────────────────────────

# Log level
# Default: info
# Options: trace, debug, info, warn, error
log_level = "info"

# Log format
# Default: text (human-readable). Set to "json" for one JSON object per line,
# which is suitable for log aggregation (Vector, Loki, Splunk, etc.).
# log_format = "json"

# Path to append daemon logs
# Default: <base>/logs/macrdp.log
# log_path = "/path/to/macrdp.log"

# ─── Session ───────────────────────────────────────────────────────────────────

# Idle timeout in seconds (disconnect after no input)
# Default: 1800 (30 minutes)
idle_timeout_secs = 1800

# Skip encoding frames that ScreenCaptureKit reports as unchanged.
# Default: false unless idle_keyframe_sec is configured
# skip_unchanged = true

# When unchanged-frame skipping is enabled, send an idle keyframe/keepalive
# after this many seconds. Default when skip_unchanged = true: 5
# idle_keyframe_sec = 5
