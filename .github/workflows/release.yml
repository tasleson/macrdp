name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            arch: x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action/setup@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            macrdp-ui/src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: macrdp-ui/package-lock.json

      - name: Install frontend dependencies
        run: cd macrdp-ui && npm ci

      - name: Build CLI (release)
        run: cargo build -p macrdp-server --release

      - name: Build UI + DMG
        run: cd macrdp-ui && npm run tauri -- build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macrdp-${{ matrix.arch }}
          path: macrdp-ui/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: macrdp-server-${{ matrix.arch }}
          path: target/release/macrdp-server

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/macrdp-aarch64/*.dmg
            artifacts/macrdp-x86_64/*.dmg
            artifacts/macrdp-server-aarch64/macrdp-server
            artifacts/macrdp-server-x86_64/macrdp-server
