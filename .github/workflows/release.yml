name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    name: Build macOS aarch64
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin --package macrdp-server

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="macrdp-server-${TAG}-aarch64-apple-darwin.tar.gz"
          cp target/aarch64-apple-darwin/release/macrdp-server .
          tar -czf "${ARCHIVE}" macrdp-server packaging/launchd/com.macrdp.daemon.plist config.example.toml
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
