# macrdp 服务端配置文件
# 将此文件复制为 config.toml 并根据需要修改
#
# 所有守护进程文件位于同一基础目录下:
#   macOS:     ~/Library/Application Support/macrdp/
#   Linux/BSD: $XDG_CONFIG_HOME/macrdp/ (或 ~/.config/macrdp/)
#
# 默认目录结构:
#   <base>/config.toml      本配置文件
#   <base>/tls/cert.pem     TLS 证书 (缺失时自动生成)
#   <base>/tls/key.pem      TLS 私钥 (随证书一起生成, 权限 0600)
#   <base>/logs/macrdp.log  守护进程日志

# ─── 网络 ─────────────────────────────────────────────────────────────────────

# 监听端口
# 默认值: 3389 (RDP 标准端口, 1024 以下需要 sudo 权限)
# 可选值: 任意有效端口号 (建议 1024-65535)
port = 13389

# 监听 IP 地址
# 默认值: 0.0.0.0 (所有 IPv4 网络接口)
# 设置为 127.0.0.1 则仅接受本机连接
bind_address = "0.0.0.0"

# v1 一次只支持一个活跃 RDP 会话
# 暂不支持多个客户端并发会话

# ─── 认证 ─────────────────────────────────────────────────────────────────────

# RDP 登录凭据 (NLA/Hybrid/CredSSP 认证)
# 作为无人值守守护进程运行时必须设置这两个字段
username = "admin"
password = "123456"

# 仅用于开发的临时凭据回退
# 默认值: false。设置为 true 且未配置 username/password 时, macrdp 会使用
# 操作系统 CSPRNG 生成一次性密码。密码绝不会写入日志。
# allow_generated_credentials = false

# ─── 显示 ─────────────────────────────────────────────────────────────────────

# 分辨率宽度 (像素)
# 默认值: 0 (自动检测 macOS 显示器分辨率, 并跟随客户端请求)
# 设置具体值 (如 1920) 则强制使用固定分辨率, 忽略客户端请求
width = 0

# 分辨率高度 (像素)
# 默认值: 0 (自动检测 macOS 显示器分辨率, 并跟随客户端请求)
# 设置具体值 (如 1080) 则强制使用固定分辨率, 忽略客户端请求
height = 0

# 目标帧率
# 默认值: 60
# 可选值: 30, 60, 120
frame_rate = 60

# 目标码率 (Mbps, 默认: 根据分辨率/帧率/质量自动计算)
# 手动设置后, 自适应质量仍会根据网络状况在此上限内调整
# bitrate_mbps = 50

# HiDPI 缩放倍率
# 默认值: 1 (不缩放)
# 将采集分辨率乘以此倍数, 在 Retina 显示器上获得更清晰的画面
# 例如: scale=2 在 1920x1080 逻辑分辨率下 → 采集 3840x2160 (4K)
# 鼠标坐标会自动映射回逻辑坐标
# hidpi_scale = 2

# 是否将 macOS 光标包含在视频帧中
# 默认值: true。这样会显示真实的 macOS 光标形状, 例如调整大小和文本光标。
# 关闭后, macrdp 会发送固定的 RDP 箭头光标。
# show_cursor = true

# ─── 编码 ─────────────────────────────────────────────────────────────────────

# 视频质量预设
# 默认值: high_quality
# 可选值:
#   "low_latency"  — 低码率, 最快编码 (1080p30 约 16 Mbps)
#   "balanced"     — 平衡画质与码率 (1080p30 约 33 Mbps)
#   "high_quality" — 最佳画质, 较高码率 (1080p30 约 50 Mbps)
quality = "high_quality"

# H.264 编码器选择
# 默认值: software
# 可选值:
#   "software"  — OpenH264 软件编码 (CPU), 支持 P 帧, 编码延迟约 40ms
#   "hardware"  — VideoToolbox 硬件编码 (GPU), 编码延迟约 6ms, 仅 macOS
#   "auto"      — 等同于 software
encoder = "hardware"

# 色度采样模式
# 默认值: avc420
# 可选值:
#   "avc420" — 标准 YUV 4:2:0 色度采样 (兼容所有 RDP 客户端)
#   "avc444" — 完整 YUV 4:4:4 色度, 通过双流 AVC444 传输 (需要 V10+ 客户端, 画质最佳)
# chroma_mode = "avc420"

# ─── TLS 证书 ──────────────────────────────────────────────────────────────────

# TLS 证书文件路径 (PEM 格式)
# 默认值: <base>/tls/cert.pem (缺失时自动生成自签名证书)
# cert_path = "/path/to/cert.pem"

# TLS 私钥文件路径 (PEM 格式)
# 默认值: <base>/tls/key.pem (随证书一起生成, 权限 0600)
# key_path = "/path/to/key.pem"

# ─── 日志 ─────────────────────────────────────────────────────────────────────

# 日志级别
# 默认值: info
# 可选值: trace, debug, info, warn, error
log_level = "info"

# 日志格式
# 默认值: text (易读文本). 设为 "json" 时每行输出一个 JSON 对象,
# 适用于 Vector、Loki、Splunk 等日志聚合系统。
# log_format = "json"

# 追加写入的守护进程日志路径
# 默认值: <base>/logs/macrdp.log
# log_path = "/path/to/macrdp.log"

# ─── 会话 ─────────────────────────────────────────────────────────────────────

# 空闲超时时间 (秒), 无输入操作后自动断开连接
# 默认值: 1800 (30 分钟)
idle_timeout_secs = 1800

# 跳过 ScreenCaptureKit 报告为未变化的帧，避免空闲时持续编码
# 默认值: false，除非配置了 idle_keyframe_sec
# skip_unchanged = true

# 启用未变化帧跳过后，每隔多少秒发送一次空闲关键帧/保活帧
# skip_unchanged = true 时的默认值: 5
# idle_keyframe_sec = 5
